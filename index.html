<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>阅卷分配 - 教研组填报系统</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, 'Noto Sans', sans-serif;
            background: #f2f5f9;
            margin: 0;
            padding: 20px;
            color: #1f2d3d;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            padding: 24px 28px;
            margin-bottom: 32px;
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0b3b5c;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sub {
            color: #4a627a;
            border-left: 4px solid #2c7da0;
            padding-left: 16px;
            margin: 12px 0 0 0;
            font-size: 0.9rem;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1f3b4c;
            display: block;
            margin-bottom: 8px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d0dde9;
            border-radius: 20px;
            font-size: 0.95rem;
            background: white;
            transition: 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.15);
        }
        button {
            background: #1e6f5c;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #0f5a4a;
            transform: translateY(-1px);
        }
        .refresh-btn {
            background: #2c7da0;
            margin: 0;
        }
        .refresh-btn:hover {
            background: #1f6280;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .assigned { background: #e0f2e9; color: #1b6b41; }
        .unassigned { background: #ffe6e2; color: #bc3900; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            background: #eef3fc;
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            backdrop-filter: blur(4px);
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #e6edf4;
        }
        .missing-row {
            background-color: #fff6eb;
        }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 130px;
        }
        .remark {
            font-size: 0.7rem;
            color: #6a7f9b;
            margin-top: 20px;
            text-align: center;
        }
        @media (max-width: 700px) {
            .card { padding: 18px; }
            th, td { font-size: 0.75rem; }
        }
        .toast {
            background: #1e2a36;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 填写卡片 -->
    <div class="card">
        <h1>📋 阅卷分配填报 · 教研组专用</h1>
        <div class="sub">组长填写科目分配情况，提交后自动汇总到飞书表格，全校实时可查</div>
        <form id="submitForm">
            <div class="form-row">
                <div class="form-group">
                    <label>📌 年级</label>
                    <select id="grade" required>
                        <option value="">请选择</option>
                        <option>七年级</option><option>八年级</option><option>九年级</option>
                        <option>高一</option><option>高二</option><option>高三</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📚 科目</label>
                    <input type="text" id="subject" placeholder="例：语文 / 数学 / 英语 ..." required>
                </div>
                <div class="form-group">
                    <label>✅ 分配状态</label>
                    <select id="status" required>
                        <option value="">请选择</option>
                        <option value="已分配">已分配</option>
                        <option value="未分配">未分配</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🧑‍🏫 负责人</label>
                    <input type="text" id="teacher" placeholder="阅卷组长姓名">
                </div>
                <div class="form-group">
                    <label>📝 备注</label>
                    <input type="text" id="remark" placeholder="选填">
                </div>
            </div>
            <button type="submit">✅ 提交分配信息</button>
            <div id="formMessage" style="margin-top: 12px; font-size:0.8rem;"></div>
        </form>
    </div>

    <!-- 展示 + 筛选卡片 -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <h2 style="margin:0 0 8px 0;">📊 实时分配结果</h2>
            <button class="refresh-btn" id="refreshBtn">🔄 刷新数据</button>
        </div>
        <div class="filter-bar">
            <div class="filter-group">
                <label>年级筛选</label>
                <select id="filterGrade"><option value="">全部年级</option></select>
            </div>
            <div class="filter-group">
                <label>状态筛选</label>
                <select id="filterStatus"><option value="">全部</option><option>已分配</option><option>未分配</option></select>
            </div>
            <div class="filter-group">
                <label>科目搜索</label>
                <input type="text" id="filterSubject" placeholder="语文 / 数学 ...">
            </div>
        </div>
        <div style="overflow-x: auto; max-height: 550px;">
            <table id="dataTable">
                <thead><tr><th>时间</th><th>年级</th><th>科目</th><th>状态</th><th>负责人</th><th>备注</th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="6" style="text-align:center;">加载记录中...</td></tr></tbody>
            </table>
        </div>
        <div class="remark">⚡ 数据存储于飞书多维表格 | 组长提交后请点“刷新”获取最新汇总</div>
    </div>
</div>

<script>
 // ========================= 配置区域 - 请替换成你自己的飞书应用信息 =========================
const APP_ID = "cli_a97636d2fe791cc3";          // 替换为 App ID
const APP_SECRET = "yo6yPjPdvI1CAGv8C50heZ3Nl4R45vn9";  // 替换为 App Secret
const ENCRYPT_KEY = "1bUj3XpQ8YtR5sLdV2hNmG7cFwZk9TxB"; // 替换为 Encrypt Key (来自事件订阅页面)
const BASE_ID = "bASEnzVHLjDLhH0iGgQ";           // 替换为多维表格ID (b开头的那串)
const TABLE_NAME = "阅卷分配记录";                // 你的多维表格名称，确保一致
// ====================================================================================

    let tenantAccessToken = "";     // 飞书访问令牌

    // 辅助函数：获取 tenant_access_token
    async function getTenantToken() {
        const url = "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal";
        const payload = {
            app_id: APP_ID,
            app_secret: APP_SECRET
        };
        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.code === 0 && data.tenant_access_token) {
                tenantAccessToken = data.tenant_access_token;
                return tenantAccessToken;
            } else {
                console.error("获取 tenant token 失败", data);
                throw new Error("飞书授权失败: " + JSON.stringify(data));
            }
        } catch (err) {
            console.error(err);
            throw new Error("网络错误，无法连接飞书");
        }
    }

    // 确保 token 有效 (简单实现，每次调用都刷新，生产可缓存5小时)
    async function ensureToken() {
        if (!tenantAccessToken) {
            await getTenantToken();
        }
        return tenantAccessToken;
    }

    // 获取表格所有记录 (读取数据)
    async function fetchAllRecords() {
        try {
            await ensureToken();
            // 先获取表格ID对应的记录列表
            const listUrl = `https://open.feishu.cn/open-apis/bitable/v1/apps/${BASE_ID}/tables/${TABLE_NAME}/records?page_size=100`;
            const resp = await fetch(listUrl, {
                headers: {
                    "Authorization": `Bearer ${tenantAccessToken}`,
                    "Content-Type": "application/json"
                }
            });
            const listData = await resp.json();
            if (listData.code !== 0) {
                console.error("获取记录失败", listData);
                return [];
            }
            const records = listData.data.items || [];
            // 转换为前端友好的数组 [{时间,年级,科目,分配状态,负责人,备注}]
            const rows = records.map(record => {
                const fields = record.fields;
                // 处理时间字段 (飞书多维表格创建时间)
                const createdAt = record.created_time ? new Date(record.created_time).toLocaleString() : "—";
                return {
                    id: record.record_id,
                    time: createdAt,
                    grade: fields["年级"] || "",
                    subject: fields["科目"] || "",
                    status: fields["分配状态"] || "",
                    teacher: fields["负责人"] || "",
                    remark: fields["备注"] || ""
                };
            });
            // 按时间倒序
            rows.sort((a,b) => new Date(b.time) - new Date(a.time));
            return rows;
        } catch (err) {
            console.error("读取飞书表格错误", err);
            return [];
        }
    }

    // 添加记录 (提交新分配)
    async function addRecord(grade, subject, status, teacher, remark) {
        try {
            await ensureToken();
            const addUrl = `https://open.feishu.cn/open-apis/bitable/v1/apps/${BASE_ID}/tables/${TABLE_NAME}/records`;
            const fields = {
                "年级": grade,
                "科目": subject,
                "分配状态": status,
                "负责人": teacher || "",
                "备注": remark || ""
            };
            const payload = { fields };
            const resp = await fetch(addUrl, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${tenantAccessToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
            const data = await resp.json();
            if (data.code === 0) {
                return { success: true };
            } else {
                console.error("飞书添加记录错误", data);
                return { success: false, msg: data.msg };
            }
        } catch (err) {
            console.error("提交异常", err);
            return { success: false, msg: err.message };
        }
    }

    // 渲染表格 (从飞书拉取最新数据并展示)
    async function renderDataTable() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = '<tr><td colspan="6">加载中...</td></tr>';
        const rows = await fetchAllRecords();
        
        // 筛选逻辑
        const gradeFilter = document.getElementById("filterGrade").value;
        const statusFilter = document.getElementById("filterStatus").value;
        const subjectKeyword = document.getElementById("filterSubject").value.trim().toLowerCase();
        
        let filtered = rows;
        if (gradeFilter) {
            filtered = filtered.filter(r => r.grade === gradeFilter);
        }
        if (statusFilter) {
            filtered = filtered.filter(r => r.status === statusFilter);
        }
        if (subjectKeyword) {
            filtered = filtered.filter(r => r.subject.toLowerCase().includes(subjectKeyword));
        }
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6">暂无数据，请组长填写～</td></tr>';
            return;
        }
        
        let html = "";
        for (let row of filtered) {
            const statusClass = row.status === "已分配" ? "assigned" : "unassigned";
            const missingClass = (row.status === "未分配") ? "missing-row" : "";
            html += `<tr class="${missingClass}">
                        <td>${row.time}</td>
                        <td>${row.grade}</td>
                        <td><strong>${row.subject}</strong></td>
                        <td><span class="status-badge ${statusClass}">${row.status}</span></td>
                        <td>${row.teacher || "—"}</td>
                        <td>${row.remark || ""}</td>
                     </tr>`;
        }
        tbody.innerHTML = html;
        
        // 更新年级筛选下拉框
        const gradeSet = new Set();
        rows.forEach(r => { if(r.grade) gradeSet.add(r.grade); });
        const gradeSelect = document.getElementById("filterGrade");
        const currentGradeVal = gradeSelect.value;
        gradeSelect.innerHTML = '<option value="">全部年级</option>';
        Array.from(gradeSet).sort().forEach(g => {
            gradeSelect.innerHTML += `<option value="${g}">${g}</option>`;
        });
        if (currentGradeVal && gradeSet.has(currentGradeVal)) gradeSelect.value = currentGradeVal;
        else gradeSelect.value = "";
    }

    // 提交表单逻辑
    document.getElementById("submitForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const grade = document.getElementById("grade").value;
        const subject = document.getElementById("subject").value.trim();
        const status = document.getElementById("status").value;
        const teacher = document.getElementById("teacher").value.trim();
        const remark = document.getElementById("remark").value.trim();
        if (!grade || !subject || !status) {
            alert("请填写完整信息（年级、科目、分配状态）");
            return;
        }
        const msgDiv = document.getElementById("formMessage");
        msgDiv.innerHTML = "⏳ 正在提交到飞书...";
        const result = await addRecord(grade, subject, status, teacher, remark);
        if (result.success) {
            msgDiv.innerHTML = "✅ 提交成功！表格已更新，点击「刷新数据」查看最新分配。";
            document.getElementById("submitForm").reset();
            // 自动刷新展示（但稍微延迟等待飞书索引）
            setTimeout(() => renderDataTable(), 800);
        } else {
            msgDiv.innerHTML = `❌ 提交失败: ${result.msg || "未知错误，请联系管理员"}`;
        }
    });
    
    // 刷新按钮
    document.getElementById("refreshBtn").addEventListener("click", () => renderDataTable());
    
    // 筛选器事件
    document.getElementById("filterGrade").addEventListener("change", () => renderDataTable());
    document.getElementById("filterStatus").addEventListener("change", () => renderDataTable());
    document.getElementById("filterSubject").addEventListener("input", () => renderDataTable());
    
    // 页面初始化
    renderDataTable().catch(err => {
        console.error(err);
        document.getElementById("tableBody").innerHTML = '<tr><td colspan="6">读取飞书失败，请检查 App ID / Secret / 表格ID 配置是否正确</td></tr>';
    });
</script>
</body>
</html>
