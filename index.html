<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>阅卷分配 · 学科组填报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4f9;
            padding: 16px;
            padding-bottom: 40px;
            color: #1e293b;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }
        .header-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f3b5c;
            margin-bottom: 4px;
        }
        .sub {
            font-size: 0.7rem;
            color: #5b6e8c;
            border-left: 3px solid #2c7da0;
            padding-left: 10px;
            margin-top: 6px;
        }
        .subject-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0 8px;
        }
        .subject-btn {
            flex: 1;
            min-width: 65px;
            background: #eef3fc;
            color: #2c5a7a;
            border: none;
            padding: 12px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .subject-btn.active {
            background: #2c7da0;
            color: white;
            box-shadow: 0 2px 8px rgba(44,125,160,0.3);
        }
        .subject-btn:active {
            transform: scale(0.96);
        }
        .fill-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .fill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e9edf2;
        }
        .fill-header h3 {
            font-size: 1.1rem;
            color: #0f3b5c;
        }
        .view-status-btn {
            background: #5b8cae;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .subject-section {
            margin-bottom: 24px;
        }
        .section-title {
            font-weight: 600;
            color: #2c7da0;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid #2c7da0;
            font-size: 0.9rem;
        }
        .grade-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .grade-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .grade-label {
            width: 90px;
            font-weight: 500;
            color: #0f3b5c;
            font-size: 0.9rem;
            background: #f5f7fb;
            padding: 8px 0;
            border-radius: 20px;
            text-align: center;
        }
        .assignment-input {
            flex: 1;
            min-width: 180px;
            padding: 12px 14px;
            font-size: 0.9rem;
            border: 1px solid #dce3ec;
            border-radius: 24px;
            background: white;
            font-family: inherit;
        }
        .assignment-input:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.1);
        }
        .assignment-input.has-value {
            background: #e8f5e9;
            border-color: #8bc34a;
        }
        .submit-btn {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-top: 8px;
        }
        .submit-btn.loading {
            background: #8ba0bc;
            cursor: not-allowed;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            width: 95%;
            max-width: 700px;
            max-height: 85%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 0;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #e9edf2;
            flex-shrink: 0;
        }
        .modal-header h3 {
            font-size: 1rem;
            color: #0f3b5c;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #8ba0bc;
            width: auto;
            padding: 0;
            line-height: 1;
        }
        .table-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            flex: 1;
            padding: 16px 20px 20px;
        }
        .status-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
            min-width: 500px;
        }
        .status-table th,
        .status-table td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }
        .status-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #2c5a7a;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }
        .status-table td:first-child,
        .status-table th:first-child {
            position: sticky;
            left: 0;
            background: white;
            font-weight: 600;
            color: #0f3b5c;
        }
        .status-table th:first-child {
            background: #f8fafc;
            z-index: 1;
        }
        .submitted-badge {
            background: #e6f7e6;
            color: #2b6e3b;
            border-radius: 20px;
            padding: 4px 10px;
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .not-submitted-badge {
            background: #fff0e6;
            color: #c55a1a;
            border-radius: 20px;
            padding: 4px 10px;
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
        }
        .no-subject {
            color: #cbd5e1;
            font-size: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1100;
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            .grade-row {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .grade-label {
                width: 100%;
                text-align: left;
                padding: 6px 0;
                background: none;
            }
            .assignment-input {
                width: 100%;
            }
            .subject-btn {
                font-size: 0.7rem;
                padding: 10px 0;
            }
            .status-table th,
            .status-table td {
                padding: 8px 4px;
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-card">
        <h1>📋 阅卷分配</h1>
        <div class="sub">点击学科组 → 填写各年级分配情况 → 提交</div>
        <div class="subject-buttons" id="subjectButtons">
            <button class="subject-btn" data-subject="语文">语文组</button>
            <button class="subject-btn" data-subject="数学">数学组</button>
            <button class="subject-btn" data-subject="英语">英语组</button>
            <button class="subject-btn" data-subject="文综">文综组</button>
            <button class="subject-btn" data-subject="理综">理综组</button>
        </div>
    </div>

    <div class="fill-card">
        <div class="fill-header">
            <h3 id="currentSubjectTitle">语文组</h3>
            <button class="view-status-btn" id="viewStatusBtn">📊 查看全部状态</button>
        </div>
        <div id="gradeListContainer"></div>
        <button class="submit-btn" id="submitBtn">✅ 提交当前学科组</button>
    </div>
</div>

<div id="statusModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📊 全部科目提交状态一览表</h3>
            <button class="close-btn" id="closeModalBtn">&times;</button>
        </div>
        <div class="table-wrapper" id="modalTableWrapper">
            <div style="text-align:center; padding:20px;">加载中...</div>
        </div>
    </div>
</div>

<script>
    // ==================== GitHub 配置 ====================
    const GITHUB_TOKEN = "GITHUB_TOKEN_PLACEHOLDER";
    const GITHUB_USER = "tardis923";
    const GITHUB_REPO = "yuejuan";
    // ===================================================

    const gradeSubjects = {
        "初一": ["语文", "数学", "英语", "政治", "历史", "地理", "生物"],
        "初二": ["语文", "数学", "英语", "物理", "政治", "历史", "地理", "生物"],
        "初三": ["语文", "数学", "英语", "物理", "化学", "政治", "历史"],
        "高一": ["语文", "数学", "英语", "物理", "化学", "生物", "历史", "地理", "政治"],
        "高二": ["语文", "数学", "英语", "物理", "化学", "生物", "历史", "地理", "政治"],
        "高三": ["语文", "数学", "英语", "物理", "化学", "生物", "历史", "地理", "政治"]
    };

    const groupSubjects = {
        "语文": ["语文"],
        "数学": ["数学"],
        "英语": ["英语"],
        "文综": ["历史", "地理", "政治"],
        "理综": ["物理", "化学", "生物"]
    };

    const grades = ["初一", "初二", "初三", "高一", "高二", "高三"];
    const allSubjects = ["语文", "数学", "英语", "历史", "地理", "政治", "物理", "化学", "生物"];

    let submittedData = {};
    let currentSubject = "语文";
    let currentInputs = {};
    let issuesCache = null;  // 缓存 Issues 列表，避免重复查询
    let isLoading = false;   // 防止重复提交

    // 获取所有 Issues（缓存）
    async function fetchAllIssues(forceRefresh = false) {
        if (issuesCache && !forceRefresh) return issuesCache;
        const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues?labels=yuejuan&state=all&per_page=100`;
        const response = await fetch(url, {
            headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const issues = await response.json();
        issuesCache = issues;
        return issues;
    }

    // 加载已提交数据
    async function loadSubmittedData(forceRefresh = false) {
        try {
            const issues = await fetchAllIssues(forceRefresh);
            const newData = {};
            for (let issue of issues) {
                try {
                    const data = JSON.parse(issue.body);
                    if (data.grade && data.subject && data.assignment !== undefined) {
                        newData[`${data.grade}|${data.subject}`] = data.assignment;
                    }
                } catch(e) {}
            }
            submittedData = newData;
            refreshCurrentDisplay();
            return submittedData;
        } catch (err) {
            console.error("加载失败:", err);
            refreshCurrentDisplay();
            return submittedData;
        }
    }

    function hasSubject(grade, subject) {
        return gradeSubjects[grade] && gradeSubjects[grade].includes(subject);
    }

    function refreshCurrentDisplay() {
        const container = document.getElementById('gradeListContainer');
        const subjects = groupSubjects[currentSubject];
        if (!container) return;

        if (currentSubject === "语文" || currentSubject === "数学" || currentSubject === "英语") {
            const subject = subjects[0];
            let html = `<div class="grade-list">`;
            for (let grade of grades) {
                if (!hasSubject(grade, subject)) continue;
                const key = `${grade}|${subject}`;
                const savedValue = submittedData[key] || '';
                currentInputs[key] = savedValue;
                const hasValueClass = savedValue ? 'has-value' : '';
                html += `
                    <div class="grade-row">
                        <div class="grade-label">${grade} ${subject}</div>
                        <input type="text" class="assignment-input ${hasValueClass}" data-grade="${grade}" data-subject="${subject}" placeholder="例：已分配给张老师" value="${escapeHtml(savedValue)}">
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
        } else {
            let html = '';
            for (let subject of subjects) {
                html += `<div class="subject-section"><div class="section-title">📖 ${subject}</div><div class="grade-list">`;
                for (let grade of grades) {
                    if (!hasSubject(grade, subject)) continue;
                    const key = `${grade}|${subject}`;
                    const savedValue = submittedData[key] || '';
                    currentInputs[key] = savedValue;
                    const hasValueClass = savedValue ? 'has-value' : '';
                    html += `
                        <div class="grade-row">
                            <div class="grade-label">${grade}</div>
                            <input type="text" class="assignment-input ${hasValueClass}" data-grade="${grade}" data-subject="${subject}" placeholder="例：已分配给张老师" value="${escapeHtml(savedValue)}">
                        </div>
                    `;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        document.querySelectorAll('.assignment-input').forEach(input => {
            input.addEventListener('input', (e) => {
                const grade = e.target.dataset.grade;
                const subject = e.target.dataset.subject;
                const key = `${grade}|${subject}`;
                currentInputs[key] = e.target.value;
                if (e.target.value) {
                    e.target.classList.add('has-value');
                } else {
                    e.target.classList.remove('has-value');
                }
            });
        });

        let titleText = `${currentSubject}组`;
        if (currentSubject === "文综") titleText = "文综组 (历史/地理/政治)";
        if (currentSubject === "理综") titleText = "理综组 (物理/化学/生物)";
        document.getElementById('currentSubjectTitle').innerText = titleText;
    }

    // 批量提交（并发）
    async function submitCurrentGroup() {
        if (isLoading) {
            showToast('正在提交中，请稍候...');
            return;
        }
        
        const subjects = groupSubjects[currentSubject];
        const toSubmit = [];

        for (let subject of subjects) {
            for (let grade of grades) {
                if (!hasSubject(grade, subject)) continue;
                const key = `${grade}|${subject}`;
                const newValue = currentInputs[key] || '';
                const oldValue = submittedData[key] || '';
                if (newValue !== oldValue) {
                    toSubmit.push({ grade, subject, assignment: newValue });
                }
            }
        }

        if (toSubmit.length === 0) {
            showToast('没有检测到修改');
            return;
        }

        isLoading = true;
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.classList.add('loading');
        submitBtn.innerText = '⏳ 提交中...';
        
        showToast(`正在提交 ${toSubmit.length} 项...`);

        try {
            // 先获取最新的 Issues 列表
            const issues = await fetchAllIssues(true);
            
            // 构建映射：grade|subject -> issue_number
            const issueMap = {};
            for (let issue of issues) {
                try {
                    const data = JSON.parse(issue.body);
                    if (data.grade && data.subject) {
                        issueMap[`${data.grade}|${data.subject}`] = issue.number;
                    }
                } catch(e) {}
            }
            
            // 并发提交所有数据
            const promises = toSubmit.map(item => {
                const key = `${item.grade}|${item.subject}`;
                const issueNumber = issueMap[key];
                return submitOne(item.grade, item.subject, item.assignment, issueNumber);
            });
            
            const results = await Promise.all(promises);
            const successCount = results.filter(r => r === true).length;
            
            if (successCount === toSubmit.length) {
                showToast(`✅ 提交成功！共 ${toSubmit.length} 项`);
                // 清空缓存，强制刷新数据
                issuesCache = null;
                await loadSubmittedData(true);
            } else {
                showToast(`⚠️ 提交完成：成功 ${successCount}/${toSubmit.length} 项`);
                issuesCache = null;
                await loadSubmittedData(true);
            }
        } catch (err) {
            console.error('提交失败:', err);
            showToast('❌ 提交失败，请重试');
        } finally {
            isLoading = false;
            submitBtn.classList.remove('loading');
            submitBtn.innerText = '✅ 提交当前学科组';
        }
    }

    async function submitOne(grade, subject, assignment, issueNumber) {
        const body = JSON.stringify({ grade, subject, assignment, updatedAt: new Date().toISOString() });
        
        if (issueNumber) {
            const updateResp = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues/${issueNumber}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ body })
            });
            return updateResp.ok;
        } else {
            const title = `${grade}·${subject}`;
            const createResp = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues`, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title, body, labels: ['yuejuan'] })
            });
            return createResp.ok;
        }
    }

    async function showStatusModal() {
        document.getElementById('modalTableWrapper').innerHTML = '<div style="text-align:center; padding:20px;">加载中...</div>';
        document.getElementById('statusModal').style.display = 'flex';
        
        await loadSubmittedData(true);
        
        let html = `<table class="status-table"><thead><tr><th>年级</th>`;
        for (let sub of allSubjects) {
            html += `<th>${sub}</th>`;
        }
        html += `</table></thead><tbody>`;
        
        for (let grade of grades) {
            html += `<tr><td style="font-weight:600;">${grade}<table>`;
            for (let sub of allSubjects) {
                if (!hasSubject(grade, sub)) {
                    html += `<td class="no-subject">—</td>`;
                } else {
                    const key = `${grade}|${sub}`;
                    const assignment = submittedData[key];
                    if (assignment && assignment.trim() !== "") {
                        html += `<td><span class="submitted-badge" title="${escapeHtml(assignment)}">✅ 已提交</span></td>`;
                    } else {
                        html += `<td><span class="not-submitted-badge">⭘ 未提交</span></td>`;
                    }
                }
            }
            html += `</tr>`;
        }
        html += `</tbody></table>`;
        
        document.getElementById('modalTableWrapper').innerHTML = html;
    }

    function switchSubject(subject) {
        if (isLoading) {
            showToast('请等待当前提交完成');
            return;
        }
        currentSubject = subject;
        document.querySelectorAll('.subject-btn').forEach(btn => {
            if (btn.dataset.subject === subject) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        refreshCurrentDisplay();
    }

    function closeModal() { document.getElementById('statusModal').style.display = 'none'; }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function escapeHtml(str) { 
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    document.getElementById('submitBtn').onclick = submitCurrentGroup;
    document.getElementById('viewStatusBtn').onclick = showStatusModal;
    document.getElementById('closeModalBtn').onclick = closeModal;
    window.onclick = (e) => { if (e.target === document.getElementById('statusModal')) closeModal(); };
    document.querySelectorAll('.subject-btn').forEach(btn => {
        btn.onclick = () => switchSubject(btn.dataset.subject);
    });

    loadSubmittedData().then(() => switchSubject('语文'));
</script>
</body>
</html>
