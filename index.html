<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>阅卷分配 - 三列模式</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f7ff;
            margin: 0;
            padding: 20px;
            color: #1f2d3d;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 24px 28px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 1.8rem;
            color: #1e466e;
            margin: 0 0 8px 0;
        }
        .sub {
            color: #4a6f8f;
            border-left: 4px solid #2c7da0;
            padding-left: 16px;
            margin: 12px 0 0 0;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #1f5e7a; transform: translateY(-1px); }
        .btn-primary { background: #1e6f5c; }
        .btn-primary:hover { background: #0f5a4a; }
        .btn-outline { background: white; color: #2c7da0; border: 1px solid #2c7da0; }
        .btn-outline:hover { background: #e9f2f9; transform: none; }
        .btn-add { background: #4a6f8f; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            background: #e9f2f9;
            padding: 12px 8px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #e2edf2;
            vertical-align: middle;
        }
        tr.changed-row {
            background-color: #fff7e0;
        }
        tr.new-row {
            background-color: #e0f7e8;
        }
        select, input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbdde6;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .delete-btn:hover { background: #ee5a5a; }
        .message {
            margin-top: 16px;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }
        .message.success { background: #dff0e6; color: #2b6e3b; }
        .message.error { background: #ffe2dd; color: #bc3900; }
        .message.loading { background: #e9f2f9; color: #1e466e; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 850px;
            max-height: 80%;
            overflow: auto;
            padding: 20px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2edf2;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .diff-table {
            width: 100%;
            font-size: 0.8rem;
            border-collapse: collapse;
        }
        .diff-table td, .diff-table th {
            border: 1px solid #e2edf2;
            padding: 8px;
            vertical-align: top;
        }
        .badge-changed {
            background: #f5a623;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .badge-new {
            background: #2b6e3b;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        @media (max-width: 700px) {
            .card { padding: 16px; }
            th, td { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📋 阅卷分配 · 批量填写</h1>
        <div class="sub">组长可自由添加年级+科目，填写分配状态。修改后点击「查看对比」→「确认提交」</div>
    </div>

    <div class="card">
        <div class="toolbar">
            <button id="addRowBtn" class="btn-add">➕ 添加一行</button>
            <div>
                <button id="compareBtn" class="btn-outline">🔍 查看本次修改对比</button>
                <button id="batchSubmitBtn" class="btn-primary">📤 批量提交</button>
                <button id="refreshBtn">🔄 刷新</button>
            </div>
        </div>

        <div style="overflow-x: auto; max-height: 600px;">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>年级</th><th>科目</th><th>分配状态</th><th style="width:60px">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div id="messageArea" class="message"></div>
    </div>
</div>

<div id="diffModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📊 本次修改对比</h3>
            <button id="closeModalBtn" style="background:none; color:#666; font-size:24px; padding:0;">&times;</button>
        </div>
        <div id="diffContent">加载中...</div>
        <div style="margin-top: 20px; text-align: right;">
            <button id="confirmSubmitBtn" class="btn-primary">✅ 确认提交以上修改</button>
        </div>
    </div>
</div>

<script>
    // ==================== ⚠️ 请修改以下配置 ⚠️ ====================
    const BASE_ID = "FXyxbX8DXaPaUMsYG8mcQfS7nUo";   // 你的表格ID
    // =================================================================
    
    // 飞书应用凭证（固定）
    const APP_ID = "cli_a97636d2fe791cc3";
    const APP_SECRET = "yo6yPjPdvI1CAGv8C50heZ3Nl4R45vn9";

    // 年级预设列表
    const gradePresets = ["七年级", "八年级", "九年级", "高一", "高二", "高三"];
    // 科目预设列表
    const subjectPresets = ["语文", "数学", "英语", "物理", "化学", "生物", "历史", "地理", "政治", "体育", "音乐", "美术"];

    let tenantAccessToken = "";
    let originalData = {};
    let currentRows = [];
    let nextId = 1;

    async function getTenantToken() {
        const url = "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal";
        const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ app_id: APP_ID, app_secret: APP_SECRET })
        });
        const data = await response.json();
        if (data.code === 0 && data.tenant_access_token) {
            tenantAccessToken = data.tenant_access_token;
            return tenantAccessToken;
        }
        throw new Error("获取飞书token失败: " + JSON.stringify(data));
    }

    async function ensureToken() {
        if (!tenantAccessToken) await getTenantToken();
        return tenantAccessToken;
    }

    // 获取表格信息
    async function getTableInfo() {
        await ensureToken();
        const url = `https://open.feishu.cn/open-apis/bitable/v1/apps/${BASE_ID}/tables`;
        const response = await fetch(url, {
            headers: { "Authorization": `Bearer ${tenantAccessToken}`, "Content-Type": "application/json" }
        });
        const data = await response.json();
        if (data.code !== 0) {
            throw new Error(`获取表格信息失败: ${data.msg} (code: ${data.code})`);
        }
        const tables = data.data.items || [];
        if (tables.length === 0) throw new Error("表格中没有数据表");
        return tables[0];
    }

    // 读取已有记录
    async function fetchExistingRecords() {
        await ensureToken();
        const tableInfo = await getTableInfo();
        const tableId = tableInfo.table_id;
        const listUrl = `https://open.feishu.cn/open-apis/bitable/v1/apps/${BASE_ID}/tables/${tableId}/records?page_size=500`;
        const response = await fetch(listUrl, {
            headers: { "Authorization": `Bearer ${tenantAccessToken}`, "Content-Type": "application/json" }
        });
        const data = await response.json();
        if (data.code !== 0) return {};
        const records = data.data.items || [];
        const map = {};
        for (let record of records) {
            const fields = record.fields;
            const grade = fields["年级"] || "";
            const subject = fields["科目"] || "";
            const key = `${grade}|${subject}`;
            map[key] = {
                record_id: record.record_id,
                status: fields["分配状态"] || "未分配"
            };
        }
        return map;
    }

    // 批量提交
    async function batchUpsert(updates) {
        await ensureToken();
        const tableInfo = await getTableInfo();
        const tableId = tableInfo.table_id;
        
        const addUrl = `https://open.feishu.cn/open-apis/bitable/v1/apps/${BASE_ID}/tables/${tableId}/records/batch_create`;
        const updateUrl = `https://open.feishu.cn/open-apis/bitable/v1/apps/${BASE_ID}/tables/${tableId}/records/batch_update`;

        const toCreate = [], toUpdate = [];
        for (let item of updates) {
            const fields = {
                "年级": item.grade,
                "科目": item.subject,
                "分配状态": item.status
            };
            if (item.record_id) {
                toUpdate.push({ record_id: item.record_id, fields });
            } else {
                toCreate.push({ fields });
            }
        }
        
        const results = [];
        if (toCreate.length) {
            const createResp = await fetch(addUrl, {
                method: "POST",
                headers: { "Authorization": `Bearer ${tenantAccessToken}`, "Content-Type": "application/json" },
                body: JSON.stringify({ items: toCreate })
            });
            const createData = await createResp.json();
            results.push(createData);
            if (createData.code !== 0) console.error("创建失败:", createData);
        }
        if (toUpdate.length) {
            const updateResp = await fetch(updateUrl, {
                method: "POST",
                headers: { "Authorization": `Bearer ${tenantAccessToken}`, "Content-Type": "application/json" },
                body: JSON.stringify({ items: toUpdate })
            });
            const updateData = await updateResp.json();
            results.push(updateData);
            if (updateData.code !== 0) console.error("更新失败:", updateData);
        }
        return results.every(r => r && r.code === 0);
    }

    // 收集变化
    function collectChanges() {
        const changes = [];
        for (let row of currentRows) {
            if (!row.grade || !row.subject) continue;
            const key = `${row.grade}|${row.subject}`;
            const existing = originalData[key];
            if (!existing && row.isNew) {
                changes.push({
                    type: "new",
                    grade: row.grade, subject: row.subject, status: row.status,
                    record_id: null
                });
            } else if (existing && existing.status !== row.status) {
                changes.push({
                    type: "modify",
                    grade: row.grade, subject: row.subject,
                    status: row.status,
                    old_status: existing.status,
                    record_id: existing.record_id
                });
            }
        }
        return changes;
    }

    // 渲染表格
    function renderTableBody() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        for (let i = 0; i < currentRows.length; i++) {
            const row = currentRows[i];
            const tr = tbody.insertRow();
            if (row.isNew) tr.classList.add("new-row");
            
            const gradeCell = tr.insertCell(0);
            const gradeSelect = document.createElement("select");
            gradeSelect.className = "grade-select";
            gradeSelect.innerHTML = `<option value="">-- 请选择年级 --</option>`;
            gradePresets.forEach(g => {
                gradeSelect.innerHTML += `<option value="${g}" ${row.grade === g ? 'selected' : ''}>${g}</option>`;
            });
            gradeSelect.addEventListener("change", (e) => { row.grade = e.target.value; markRowChange(tr, row); });
            gradeCell.appendChild(gradeSelect);
            
            const subjectCell = tr.insertCell(1);
            const subjectInput = document.createElement("input");
            subjectInput.type = "text";
            subjectInput.placeholder = "输入科目";
            subjectInput.value = row.subject || "";
            const datalistId = `datalist_${i}`;
            const datalist = document.createElement("datalist");
            datalist.id = datalistId;
            subjectPresets.forEach(s => { const opt = document.createElement("option"); opt.value = s; datalist.appendChild(opt); });
            subjectInput.setAttribute("list", datalistId);
            document.body.appendChild(datalist);
            subjectInput.addEventListener("input", (e) => { row.subject = e.target.value; markRowChange(tr, row); });
            subjectCell.appendChild(subjectInput);
            
            const statusCell = tr.insertCell(2);
            const statusSelect = document.createElement("select");
            statusSelect.innerHTML = `<option value="已分配" ${row.status === "已分配" ? 'selected' : ''}>已分配</option><option value="未分配" ${row.status === "未分配" ? 'selected' : ''}>未分配</option>`;
            statusSelect.addEventListener("change", (e) => { row.status = e.target.value; markRowChange(tr, row); });
            statusCell.appendChild(statusSelect);
            
            const actionCell = tr.insertCell(3);
            const delBtn = document.createElement("button");
            delBtn.textContent = "删除";
            delBtn.className = "delete-btn";
            delBtn.onclick = () => { currentRows.splice(i, 1); renderTableBody(); };
            actionCell.appendChild(delBtn);
        }
    }
    
    function markRowChange(tr, row) {
        if (!row.grade || !row.subject) return;
        const key = `${row.grade}|${row.subject}`;
        const existing = originalData[key];
        if (!existing && row.isNew) {
            tr.classList.add("new-row");
            tr.classList.remove("changed-row");
        } else if (existing && existing.status !== row.status) {
            tr.classList.add("changed-row");
            tr.classList.remove("new-row");
        } else {
            tr.classList.remove("changed-row", "new-row");
        }
    }

    async function loadFromFeishu() {
        try {
            const existing = await fetchExistingRecords();
            originalData = existing;
            const rows = [];
            let idCounter = 1;
            for (const [key, val] of Object.entries(existing)) {
                const [grade, subject] = key.split("|");
                rows.push({
                    id: idCounter++, grade, subject,
                    status: val.status,
                    isNew: false, originalKey: key
                });
            }
            currentRows = rows;
            nextId = idCounter;
            renderTableBody();
            showMessage("数据加载成功", "success");
        } catch (err) {
            console.error(err);
            showMessage("加载飞书数据失败: " + err.message, "error");
            currentRows = [];
            renderTableBody();
        }
    }

    function addNewRow() {
        currentRows.push({
            id: nextId++,
            grade: "", subject: "", status: "未分配",
            isNew: true, originalKey: null
        });
        renderTableBody();
    }

    function showDiffModal(changes) {
        if (!changes.length) {
            document.getElementById("diffContent").innerHTML = '<p>✅ 没有检测到任何修改</p>';
            document.getElementById("diffModal").style.display = "flex";
            return;
        }
        let html = `<table class="diff-table"><thead><tr><th>类型</th><th>年级</th><th>科目</th><th>原状态</th><th>新状态</th></tr></thead><tbody>`;
        for (let c of changes) {
            const typeLabel = c.type === "new" ? '<span class="badge-new">新增</span>' : '<span class="badge-changed">修改</span>';
            html += `<tr><td>${typeLabel}</td><td>${c.grade}</td><td>${c.subject}</td><td>${c.old_status || '—'}</td><td><strong>${c.status}</strong></td></tr>`;
        }
        html += `</tbody></table><p><span class="badge-changed">共 ${changes.length} 条变更</span></p>`;
        document.getElementById("diffContent").innerHTML = html;
        document.getElementById("diffModal").style.display = "flex";
        window.pendingChanges = changes;
    }

    async function doSubmit(changes) {
        if (!changes || changes.length === 0) {
            showMessage("没有检测到修改", "success");
            return;
        }
        const submitData = changes.map(c => ({
            grade: c.grade, subject: c.subject, status: c.status, record_id: c.record_id || null
        }));
        showMessage(`正在提交 ${submitData.length} 条数据...`, "loading");
        const success = await batchUpsert(submitData);
        if (success) {
            showMessage(`✅ 提交成功！共 ${submitData.length} 条数据已保存`, "success");
            await loadFromFeishu();
        } else {
            showMessage("❌ 提交失败，请检查网络或配置。打开F12查看具体错误", "error");
        }
        document.getElementById("diffModal").style.display = "none";
    }

    function showMessage(msg, type) {
        const msgDiv = document.getElementById("messageArea");
        msgDiv.innerHTML = msg;
        msgDiv.className = `message ${type}`;
        setTimeout(() => { if (msgDiv.innerHTML === msg) msgDiv.innerHTML = ""; }, 3000);
    }

    document.getElementById("addRowBtn").addEventListener("click", addNewRow);
    document.getElementById("compareBtn").addEventListener("click", () => showDiffModal(collectChanges()));
    document.getElementById("batchSubmitBtn").addEventListener("click", async () => await doSubmit(collectChanges()));
    document.getElementById("refreshBtn").addEventListener("click", () => loadFromFeishu());
    document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("diffModal").style.display = "none");
    document.getElementById("confirmSubmitBtn").addEventListener("click", async () => {
        let changes = window.pendingChanges || collectChanges();
        await doSubmit(changes);
    });
    window.addEventListener("click", (e) => { if (e.target === document.getElementById("diffModal")) document.getElementById("diffModal").style.display = "none"; });
    
    loadFromFeishu();
</script>
</body>
</html>
